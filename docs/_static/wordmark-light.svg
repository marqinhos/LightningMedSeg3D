  <!-- Wordmark (right) -->
  <text x="285" y="170" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="700" font-size="88">
    <tspan fill="#2C5F8A">Lightning</tspan><tspan fill="#1F2A37">MedSeg</tspan><tspan fill="#F5A623">3D</tspan>
  </text>
  <text x="287" y="222" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="400"
