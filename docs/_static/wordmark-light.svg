<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1270 300" width="1270" height="300" role="img" aria-label="LightningMedSeg3D">
  <defs>
    <linearGradient id="wbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2C5F8A"/>
      <stop offset="1" stop-color="#2E7D5B"/>
    </linearGradient>
    <linearGradient id="wbolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD23F"/>
      <stop offset="1" stop-color="#F5A623"/>
    </linearGradient>
    <filter id="wsoft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0B2233" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Icon mark (left) -->
  <g transform="translate(10,30)">
    <rect x="0" y="0" width="240" height="240" rx="56" fill="url(#wbg)"/>
    <rect x="5" y="5" width="230" height="230" rx="51" fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="2"/>
    <g filter="url(#wsoft)">
      <g transform="rotate(-7 120 129) translate(-0.5,-1)" opacity="0.45">
        <rect x="68" y="70" width="104" height="70" rx="10" fill="#EAF2F8"/>
      </g>
      <g transform="rotate(-3.5 120 129) translate(-0.5,-1)" opacity="0.7">
        <rect x="65" y="82" width="108" height="73" rx="10" fill="#F4F9FC"/>
      </g>
      <g>
        <rect x="63" y="94" width="114" height="78" rx="11" fill="#FFFFFF"/>
        <path d="M100 117 c16 -12 43 -10 51 4 c7 12 -1 28 -16 33 c-19 6 -40 -3 -43 -18 c-2 -8 2 -15 8 -19 Z"
