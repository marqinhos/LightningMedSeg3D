<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="LightningMedSeg3D">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2C5F8A"/>
      <stop offset="1" stop-color="#2E7D5B"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD23F"/>
      <stop offset="1" stop-color="#F5A623"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0B2233" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Badge background -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect x="10" y="10" width="492" height="492" rx="108" fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="4"/>

  <!-- Stack of imaging slices (3D volume) -->
  <g filter="url(#soft)">
    <g transform="rotate(-7 256 276)" opacity="0.45">
      <rect x="145" y="150" width="222" height="150" rx="20" fill="#EAF2F8"/>
    </g>
    <g transform="rotate(-3.5 256 276)" opacity="0.7">
      <rect x="140" y="176" width="230" height="156" rx="20" fill="#F4F9FC"/>
    </g>
    <!-- Front slice with a segmented region -->
    <g>
      <rect x="134" y="202" width="244" height="166" rx="22" fill="#FFFFFF"/>
      <path d="M214 250 c34 -26 92 -22 108 8 c16 26 -2 60 -34 70 c-40 13 -86 -6 -92 -38 c-4 -18 4 -32 18 -40 Z"
            fill="#34C77B"/>
      <path d="M214 250 c34 -26 92 -22 108 8 c16 26 -2 60 -34 70 c-40 13 -86 -6 -92 -38 c-4 -18 4 -32 18 -40 Z"
            fill="none" stroke="#1B7A48" stroke-width="5" stroke-dasharray="3 9" stroke-linecap="round"/>
      <circle cx="300" cy="300" r="9" fill="#B5651D"/>
    </g>
  </g>

  <!-- Lightning bolt -->
  <g filter="url(#soft)">
    <polygon points="300,120 214,282 268,282 224,406 336,232 282,232 330,120"
             fill="url(#bolt)" stroke="#FFFFFF" stroke-width="9" stroke-linejoin="round"/>
  </g>
</svg>
