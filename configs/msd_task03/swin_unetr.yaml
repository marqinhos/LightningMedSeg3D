# SwinUNETR on MSD Task03 (liver + hepatic tumour).
seed_everything: 42

trainer:
  accelerator: gpu
  devices: 1
  precision: 16-mixed
  max_epochs: 500
  default_root_dir: ./runs/msd_task03/swin_unetr

model:
  architecture: swin_unetr
  in_channels: 1
  num_classes: 3
  roi_size: [96, 96, 96]
  learning_rate: 4.0e-4
  weight_decay: 1.0e-5
  scheduler: cosine
  max_epochs: 500
  loss: dice_ce
  class_weights: [0.05, 0.45, 0.50]

data:
  dataset: msd_task03
  data_root: ./data
  roi_size: [96, 96, 96]
  batch_size: 2
  train_frac: 0.8
  val_frac: 0.1
  test_frac: 0.1
