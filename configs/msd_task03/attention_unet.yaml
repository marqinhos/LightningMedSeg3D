# Attention-UNet on MSD Task03 (liver + hepatic tumour).
seed_everything: 42

trainer:
  accelerator: gpu
  devices: 1
  precision: 16-mixed
  max_epochs: 800
  log_every_n_steps: 25
  gradient_clip_val: 1.0
  default_root_dir: ./runs/msd_task03/attention_unet
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: val/dice
        mode: max
        save_top_k: 3
        save_last: true

model:
  architecture: attention_unet
  in_channels: 1
  num_classes: 3                # background, liver, hepatic tumour
  roi_size: [64, 64, 64]
  learning_rate: 1.0e-3
  weight_decay: 0.05
  scheduler: cosine
  max_epochs: 800
  loss: dice_ce
  class_weights: [0.05, 0.45, 0.50]   # up-weight tumour class for microlesion sensitivity

data:
  dataset: msd_task03
  data_root: ./data
  roi_size: [64, 64, 64]
  intensity_range: [-175.0, 250.0]
  spacing: [1.5, 1.5, 2.0]
  batch_size: 2
  num_workers: 4
  train_frac: 0.7
  val_frac: 0.1
  test_frac: 0.2
  seed: 42
  cache_rate: 1.0
  samples_per_volume: 4
