# 3D U-Net on MSD Task03 (liver + hepatic tumour).
# Run:  lightning-medseg3d fit --config configs/msd_task03/unet.yaml
seed_everything: 42

trainer:
  accelerator: gpu
  devices: 1
  precision: 16-mixed
  max_epochs: 500
  log_every_n_steps: 25
  gradient_clip_val: 1.0
  default_root_dir: ./runs/msd_task03/unet
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: val/dice
        mode: max
        save_top_k: 3
        save_last: true
        filename: "epoch={epoch}-dice={val/dice:.4f}"
        auto_insert_metric_name: false
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: epoch

model:
  architecture: unet
  in_channels: 1
  num_classes: 3
  roi_size: [96, 96, 96]
  sw_batch_size: 4
  sw_overlap: 0.5
  learning_rate: 1.0e-3
  weight_decay: 1.0e-5
  scheduler: cosine
  warmup_epochs: 5
  max_epochs: 500
  loss: dice_ce
  class_weights: [0.05, 0.45, 0.50]
  nsd_tolerance_mm: 2.0

data:
  dataset: msd_task03
  data_root: ./data
  roi_size: [96, 96, 96]
  batch_size: 2
  num_workers: 4
  train_frac: 0.8
  val_frac: 0.1
  test_frac: 0.1
