# Attention-UNet on BTCV.
seed_everything: 42

trainer:
  accelerator: gpu
  devices: 1
  precision: 16-mixed
  max_epochs: 500
  log_every_n_steps: 25
  gradient_clip_val: 1.0
  default_root_dir: ./runs/btcv/attention_unet

model:
  architecture: attention_unet
  in_channels: 1
  num_classes: 2
  roi_size: [96, 96, 96]
  learning_rate: 1.0e-3
  weight_decay: 1.0e-5
  scheduler: cosine
  max_epochs: 500
  loss: dice_ce

data:
  dataset: btcv
  data_root: ./data
  roi_size: [96, 96, 96]
  batch_size: 2
  num_workers: 4
