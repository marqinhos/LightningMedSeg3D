# SwinUNETR on BTCV (liver-only segmentation).
# Reproduces the result reported in Table tab:evaluacion_modelos.
# Run:  lightning-medseg3d fit --config configs/btcv/swin_unetr.yaml
seed_everything: 42

trainer:
  accelerator: gpu
  devices: 1
  precision: 16-mixed
  max_epochs: 500
  log_every_n_steps: 25
  gradient_clip_val: 1.0
  deterministic: warn
  default_root_dir: ./runs/btcv/swin_unetr
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: val/dice
        mode: max
        save_top_k: 3
        save_last: true
        filename: "epoch={epoch}-dice={val/dice:.4f}"
        auto_insert_metric_name: false
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: epoch
  logger:
    - class_path: lightning.pytorch.loggers.TensorBoardLogger
      init_args:
        save_dir: ./runs/btcv/swin_unetr
        name: tb

model:
  architecture: swin_unetr
  in_channels: 1
  num_classes: 2
  roi_size: [96, 96, 96]
  sw_batch_size: 4
  sw_overlap: 0.5
  learning_rate: 4.0e-4
  weight_decay: 1.0e-5
  scheduler: cosine
  warmup_epochs: 5
  max_epochs: 500
  loss: dice_ce
  nsd_tolerance_mm: 2.0

data:
  dataset: btcv
  data_root: ./data
  roi_size: [96, 96, 96]
  intensity_range: [-175.0, 250.0]
  spacing: [1.5, 1.5, 2.0]
  batch_size: 2
  num_workers: 4
  train_frac: 0.7
  val_frac: 0.1
  test_frac: 0.2
  seed: 42
  cache_rate: 1.0
  samples_per_volume: 4
