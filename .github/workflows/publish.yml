name: Publish to PyPI

# Builds the sdist + wheel and publishes to PyPI when a GitHub Release is
# published. Uses PyPI Trusted Publishing (OIDC), so no API token is stored:
# configure the project as a trusted publisher at https://pypi.org/manage/account/publishing/
# (or replace the publish step with a twine upload using a PYPI_API_TOKEN secret).

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/lightning-medseg3d/
    permissions:
      id-token: write   # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Check metadata
        run: |
          pip install twine
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
