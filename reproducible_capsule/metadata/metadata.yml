metadata_version: 1
name: "LightningMedSeg3D — reproducible capsule"
description: >
  Reproducible capsule for LightningMedSeg3D, a configuration-driven PyTorch
  Lightning framework for reproducible 3D medical image segmentation
  benchmarking. The reproducible run builds all nine convolutional and
  transformer architectures through the model factory, verifies their output
  shapes, and executes a CPU-only synthetic end-to-end sliding-window inference
  demo that writes a NIfTI prediction and a JSON summary to /results.
